<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lakshman M L | Portfolio | Software, AI/ML & IoT Engineer</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Award-winning personal portfolio website of Sri Lakshman M L. Software Engineer, AI & ML Engineer, and IoT Developer. Explore projects, experience, and certificates.">
    <meta name="keywords" content="Sri Lakshman M L, Portfolio, Software Engineer, AI ML Engineer, IoT Developer, Arduino, ESP32, Python, Flask, Three.js, GSAP">
    <meta name="author" content="Sri Lakshman M L">
    
    <!-- OpenGraph Tags -->
    <meta property="og:title" content="Sri Lakshman M L | Portfolio">
    <meta property="og:description" content="Software Engineer | AI & ML Engineer | IoT Developer portfolio website. Build using cutting-edge design trends.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/srilakshman73">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            bg: '#030712',
                            card: 'rgba(15, 23, 42, 0.45)',
                            border: 'rgba(255, 255, 255, 0.08)',
                            glow: '#00f2fe',
                            glowPurple: '#ec4899',
                            accent: '#8b5cf6',
                            green: '#10b981',
                            dark: '#0f172a',
                            text: '#94a3b8',
                            lightbg: '#f8fafc',
                            lightcard: 'rgba(255, 255, 255, 0.65)',
                            lightborder: 'rgba(0, 0, 0, 0.08)',
                        }
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px rgba(0, 242, 254, 0.35)',
                        'neon-purple': '0 0 15px rgba(236, 72, 153, 0.35)',
                        'neon-green': '0 0 15px rgba(16, 185, 129, 0.35)',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS Link -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Chart.js for Radar Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-cyber-bg text-gray-100 font-sans overflow-x-hidden selection:bg-cyan-500 selection:text-black">

    <!-- Loading Screen (Cyber Bootloader) -->
    <div id="loader" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-cyber-bg transition-opacity duration-700">
        <script>
            if (window.location.pathname !== '/' || sessionStorage.getItem('site_booted') === 'true') {
                document.getElementById('loader').style.display = 'none';
            }
        </script>
        <div class="absolute inset-0 bg-grid-pattern opacity-10"></div>
        <div class="z-10 w-full max-w-md p-6 bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl relative overflow-hidden">
            <!-- Scanline effect -->
            <div class="scanline"></div>
            
            <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-3">
                <div class="flex items-center space-x-2">
                    <span class="w-3 h-3 rounded-full bg-red-500"></span>
                    <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                </div>
                <span class="text-xs font-mono text-cyan-400">SYSTEM BOOT: v4.26.0</span>
            </div>
            
            <div class="font-mono text-xs text-slate-400 space-y-1 h-36 overflow-hidden mb-6" id="loading-logs">
                <p class="text-cyan-500">> Initializing core variables...</p>
            </div>
            
            <div class="relative w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div id="loading-bar" class="absolute top-0 left-0 h-full w-0 bg-gradient-to-r from-cyan-400 via-purple-500 to-pink-500 transition-all duration-100 ease-out"></div>
            </div>
            
            <div class="flex justify-between items-center mt-3 font-mono text-xs">
                <span class="text-slate-500">Status: <span id="loading-status" class="text-cyan-400">Loading modules...</span></span>
                <span id="loading-percentage" class="text-purple-400">0%</span>
            </div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor hidden md:block">
        <div class="cursor-dot"></div>
        <div class="cursor-outline"></div>
    </div>

    <!-- Interactive Background (Three.js canvas) -->
    <div id="background-canvas" class="fixed inset-0 -z-50 pointer-events-none"></div>
    <div class="aurora-glow fixed inset-0 -z-40 pointer-events-none opacity-45 dark:opacity-30"></div>

    <!-- Main Page Content Block -->
    {% block content %}
    {% endblock %}

    <!-- Custom JS Libraries & Entrypoints -->
    <script src="{{ url_for('static', filename='js/three-scene.js') }}"></script>
    <script src="{{ url_for('static', filename='js/stats.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
